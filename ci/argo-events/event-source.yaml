apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: mall-github
  namespace: infra
spec:
  github:
    mall-push:
      repositories:
        - owner: NorthAIMigraTeam
          names:
            - mall
      events:
        - push
      webhook:
        endpoint: /push
        port: "12000"
        method: POST
      # GitHub Webhook Secret 通过 K8S Secret 注入
      webhookSecret:
        name: github-webhook-secret
        key: secret
