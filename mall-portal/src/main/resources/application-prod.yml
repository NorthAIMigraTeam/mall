server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://db:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: reader
    password: 123456
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 20 #最小空闲连接数（压测期上调，避免突发扩 Pod 时建连延迟）
      max-active: 30 #最大连接数（压测期上调；portal 15 实例 × 30 = 450 ≤ MySQL max_connections × 0.7）
      max-wait: 3000 #获取连接最大等待 3s，避免业务线程被池耗尽长时间阻塞
      validation-query: SELECT 1
      test-while-idle: true #空闲时心跳保活，防止 wait_timeout 半关连接
      time-between-eviction-runs-millis: 60000
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" #不统计这些请求数据
      stat-view-servlet: #访问监控网页的登录用户名和密码
        login-username: druid
        login-password: druid

  data:
    mongodb:
      host: mongo
      port: 27017
      database: mall-port

  redis:
    host: redis # Redis服务器地址
    database: 0 # Redis数据库索引（默认为0）
    port: 6379 # Redis服务器连接端口
    password: # Redis服务器连接密码（默认为空）
    timeout: 3000ms # 连接超时时间（压测期上调，避免毛刺被判超时）
    lettuce:
      pool:
        max-active: 20 #连接池最大连接数（压测期显式池化，避免单连接打满）
        max-idle: 10
        min-idle: 5
        max-wait: 1000ms

  rabbitmq:
    host: rabbit
    port: 5672
    virtual-host: /mall
    username: mall
    password: mall

mongo:
  insert:
    sqlEnable: true # 用于控制是否通过数据库数据来插入mongo

logging:
  file:
    path: /var/logs
  level:
    root: info
    com.macro.mall: info

logstash:
  host: logstash

alipay:
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  appId: your appId
  alipayPublicKey: your alipayPublicKey
  appPrivateKey: your appPrivateKey
  returnUrl: http://192.168.3.101:8060/#/pages/money/paySuccess
  notifyUrl:

